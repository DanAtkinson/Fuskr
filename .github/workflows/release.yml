name: Build and Release Extension

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v5.0.2
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Extract version from tag
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update package.json with tag version
        run: |
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version
          cat package.json | grep '"version"'
        
      - name: Sync version to manifests
        run: npm run sync:version
        
      - name: Run full build pipeline (skipping version sync)
        run: npm run build:extensions:prod

      - name: Build release notes (includes Product Details)
        id: notes
        run: |
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "## Fuskr Extension ${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          echo >> $GITHUB_OUTPUT
          echo "### 📝 Product details (for Chrome Web Store)" >> $GITHUB_OUTPUT
          echo >> $GITHUB_OUTPUT
          if [ -f store/chrome-product-details.md ]; then
            cat store/chrome-product-details.md >> $GITHUB_OUTPUT
          else
            echo "Product details file not found (store/chrome-product-details.md)." >> $GITHUB_OUTPUT
          fi
          echo >> $GITHUB_OUTPUT
          echo >> $GITHUB_OUTPUT
          echo "### Installation" >> $GITHUB_OUTPUT
          echo "- Chrome/Edge/Chromium: use 'fuskr-chromium.zip' (load unpacked for development)" >> $GITHUB_OUTPUT
          echo "- Firefox: use 'fuskr-firefox.zip' (temporary add-on)" >> $GITHUB_OUTPUT
          echo >> $GITHUB_OUTPUT
          echo "### Changes" >> $GITHUB_OUTPUT
          echo "See commits for details." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload product details as artifact
        uses: actions/upload-artifact@v7
        with:
          name: chrome-product-details
          path: store/chrome-product-details.md
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: Fuskr Extension ${{ steps.version.outputs.TAG_NAME }}
          body: ${{ steps.notes.outputs.BODY }}
          draft: false
          prerelease: false
          files: |
            dist/fuskr-chromium.zip
            dist/fuskr-firefox.zip
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: extension-builds-${{ steps.version.outputs.VERSION }}
          path: |
            dist/*.zip
            dist/chromium/**
            dist/firefox/**
          retention-days: 90

      - name: Compute next version (patch bump)
        id: next
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          node -e "
            const [maj,min,pat] = process.env.VERSION.split('.').map(Number);
            if ([maj,min,pat].some(n => Number.isNaN(n))) throw new Error('VERSION must be in semver format major.minor.patch, got: ' + process.env.VERSION);
            console.log('NEXT_VERSION=' + [maj,min,pat+1].join('.'));
          " >> $GITHUB_OUTPUT

      - name: Bump master to next patch version (post-release)
        if: success()
        env:
          NEXT_VERSION: ${{ steps.next.outputs.NEXT_VERSION }}
          TAG_NAME: ${{ steps.version.outputs.TAG_NAME }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

          # Safety guard: only mutate the configured default branch (master).
          # If the repository's default branch is ever renamed, this prevents
          # accidental version bumps on an unexpected branch.
          if [ "${DEFAULT_BRANCH}" != "master" ]; then
            echo "Skipping version bump: default branch is '${DEFAULT_BRANCH}', expected 'master'."
            exit 0
          fi

          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          if [ "${CURRENT_VERSION}" = "${NEXT_VERSION}" ]; then
            echo "master already at ${NEXT_VERSION}; nothing to do."
            exit 0
          fi

          npm version "${NEXT_VERSION}" --no-git-tag-version
          npm run sync:version

          git add package.json src/manifest.json src/manifest-firefox.json
          git commit -m "chore: bump version to ${NEXT_VERSION} after release ${TAG_NAME}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
