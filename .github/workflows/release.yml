name: Build and Release Extension

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v5.0.2
  workflow_dispatch:  # Allow manual triggering

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Extract version from tag
        id: version
        run: |
          echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update package.json with tag version
        run: |
          npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version
          cat package.json | grep '"version"'
        
      - name: Sync version to manifests
        run: npm run sync:version
        
      - name: Run full build pipeline (skipping version sync)
        run: npm run build:extensions:prod

      - name: Build release notes (includes Product Details)
        id: notes
        run: |
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "## Fuskr Extension ${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          echo >> $GITHUB_OUTPUT
          echo "### 📝 Product details (for Chrome Web Store)" >> $GITHUB_OUTPUT
          echo >> $GITHUB_OUTPUT
          if [ -f store/chrome-product-details.md ]; then
            cat store/chrome-product-details.md >> $GITHUB_OUTPUT
          else
            echo "Product details file not found (store/chrome-product-details.md)." >> $GITHUB_OUTPUT
          fi
          echo >> $GITHUB_OUTPUT
          echo >> $GITHUB_OUTPUT
          echo "### Installation" >> $GITHUB_OUTPUT
          echo "- Chrome/Edge/Chromium: use 'fuskr-chromium.zip' (load unpacked for development)" >> $GITHUB_OUTPUT
          echo "- Firefox: use 'fuskr-firefox.zip' (temporary add-on)" >> $GITHUB_OUTPUT
          echo >> $GITHUB_OUTPUT
          echo "### Changes" >> $GITHUB_OUTPUT
          echo "See commits for details." >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload product details as artifact
        uses: actions/upload-artifact@v7
        with:
          name: chrome-product-details
          path: store/chrome-product-details.md
          if-no-files-found: warn

      - name: Persist version files to default branch
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          TAG_NAME: ${{ steps.version.outputs.TAG_NAME }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "${DEFAULT_BRANCH}"
          git checkout -B "${DEFAULT_BRANCH}" "origin/${DEFAULT_BRANCH}"

          npm version "${VERSION}" --no-git-tag-version
          npm run sync:version

          if git diff --quiet -- package.json src/manifest.json src/manifest-firefox.json; then
            echo "Version files are already up to date on ${DEFAULT_BRANCH}."
            exit 0
          fi

          git add package.json src/manifest.json src/manifest-firefox.json
          git commit -m "chore(release): sync version ${VERSION} from tag ${TAG_NAME}"
          git push origin "HEAD:${DEFAULT_BRANCH}"
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG_NAME }}
          name: Fuskr Extension ${{ steps.version.outputs.TAG_NAME }}
          body: ${{ steps.notes.outputs.BODY }}
          draft: false
          prerelease: false
          files: |
            dist/fuskr-chromium.zip
            dist/fuskr-firefox.zip
          
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: extension-builds-${{ steps.version.outputs.VERSION }}
          path: |
            dist/*.zip
            dist/chromium/**
            dist/firefox/**
          retention-days: 90
