name: CI/CD Pipeline

on:
 push:
  branches: [master, main, develop]
 pull_request:
  branches: [master, main]

jobs:
 test:
  name: Test & Build
  runs-on: ubuntu-latest

  strategy:
   matrix:
    node-version: [24.x]

  steps:
   - name: 📁 Checkout repository
     uses: actions/checkout@v6

   - name: 📦 Setup Node.js ${{ matrix.node-version }}
     uses: actions/setup-node@v6
     with:
      node-version: ${{ matrix.node-version }}
      cache: 'npm'

   - name: 🔧 Install dependencies
     run: npm ci

   - name: 🧪 Run tests
     run: npm test -- --no-watch --no-progress --browsers=ChromeHeadless

   - name: 🏗️ Build project
     run: npm run build

   - name: 📊 Upload coverage reports
     if: matrix.node-version == '24.x'
     uses: codecov/codecov-action@v5
     with:
      file: ./coverage/lcov.info
      flags: unittests
      name: codecov-umbrella
      fail_ci_if_error: false

 lint:
  name: Code Quality
  runs-on: ubuntu-latest

  steps:
   - name: 📁 Checkout repository
     uses: actions/checkout@v6

   - name: 📦 Setup Node.js
     uses: actions/setup-node@v6
     with:
      node-version: '24.x'
      cache: 'npm'

   - name: 🔧 Install dependencies
     run: npm ci

   - name: 🔍 Run linter
     run: |
      echo "Running lint check..."
      npm run lint || echo "⚠️ Lint issues found - see output above. This does not fail the build."
      echo "✅ Lint check completed"

   - name: 🎨 Check code formatting
     run: |
      echo "Checking code formatting with Prettier..."
      npm run format:check

 build-extensions:
  name: Build Browser Extensions
  runs-on: ubuntu-latest
  needs: [test, lint]

  steps:
   - name: 📁 Checkout repository
     uses: actions/checkout@v6

   - name: 📦 Setup Node.js
     uses: actions/setup-node@v6
     with:
      node-version: '24.x'
      cache: 'npm'

   - name: 🔧 Install dependencies
     run: npm ci

   - name: 🏗️ Build for production
     run: npm run build

   - name: 📦 Package Chrome extension
     run: |
      if [ -f "package-chrome.json" ]; then
        npm run package:chrome
      else
        echo "Chrome packaging script not found, skipping"
      fi

   - name: 🦊 Package Firefox extension
     run: |
      if [ -f "package-firefox.json" ]; then
        npm run package:firefox
      else
        echo "Firefox packaging script not found, skipping"
      fi

   - name: 📤 Upload build artifacts
     uses: actions/upload-artifact@v6
     with:
      name: extension-builds
      path: |
       dist/
       *.zip
      retention-days: 30

 e2e-chrome:
  name: E2E Tests (Chrome)
  runs-on: ubuntu-latest
  needs: [test]

  steps:
   - name: 📁 Checkout repository
     uses: actions/checkout@v6

   - name: 📦 Setup Node.js
     uses: actions/setup-node@v6
     with:
      node-version: '24.x'
      cache: 'npm'

   - name: 🔧 Install dependencies
     run: npm ci

   - name: 🎭 Install Playwright Chromium
     run: npx playwright install chromium --with-deps

   - name: 🏗️ Build Chromium extension
     run: npm run build:extensions

   - name: 🧪 Run Playwright e2e tests
     run: SKIP_BUILD=1 npm run test:e2e

   - name: 📊 Upload Playwright report
     if: always()
     uses: actions/upload-artifact@v6
     with:
      name: playwright-report
      path: playwright-report/
      retention-days: 14
